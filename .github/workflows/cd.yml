name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deploys on the same host the runner lives on (see
      # infra/github-runner/SETUP.md) by writing a real .env file from
      # repo/environment secrets and re-running docker compose in place --
      # no registry push, no separate deploy target.
      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          FAUCET_PRIVATE_KEY=${{ secrets.FAUCET_PRIVATE_KEY }}
          FAUCET_AMOUNT_ETH=${{ secrets.FAUCET_AMOUNT_ETH }}
          EOF

      - name: Deploy
        run: docker compose up -d --build --remove-orphans

      - name: Smoke-test the deployed backend
        run: curl --fail --retry 10 --retry-delay 3 http://localhost:8090/health

      - name: Clean up dangling images
        if: always()
        run: docker image prune -f
