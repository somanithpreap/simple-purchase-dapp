name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deploys on the same host the runner lives on (see
      # infra/github-runner/SETUP.md) by writing a real .env file from
      # repo/environment secrets and re-running docker compose in place --
      # no registry push, no separate deploy target. Points at Sepolia, not
      # the local Hardhat chain -- RPC_URL/CONTRACT_ADDRESS come from an RPC
      # provider and a one-time `npm run deploy:sepolia` (see
      # DEPLOYMENT.md), not from COMPOSE_PROFILES=local-chain.
      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          RPC_URL=${{ secrets.RPC_URL }}
          CONTRACT_ADDRESS=${{ secrets.CONTRACT_ADDRESS }}
          EOF

      - name: Deploy
        run: docker compose up -d --build --remove-orphans

      - name: Smoke-test the deployed backend
        run: curl --fail --retry 10 --retry-delay 3 http://localhost:8090/health

      - name: Clean up dangling images
        if: always()
        run: docker image prune -f
