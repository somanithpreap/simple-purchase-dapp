services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dapp}
      POSTGRES_DB: dapp
    ports:
      # Published so CI (and local devs outside Docker) can create a
      # dedicated test database and run integration tests directly.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dapp -d dapp"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks: [app-net]

  # Local Hardhat chain + one-shot deploy, used only for the local dev/CI
  # flow. Not started unless the "local-chain" profile is active (see
  # COMPOSE_PROFILES in .env.example) -- a Sepolia deployment has no local
  # chain and points RPC_URL/CONTRACT_ADDRESS at the real testnet instead.
  hardhat-node:
    build: ./contracts
    image: simple-purchase-dapp-contracts:local
    profiles: ["local-chain"]
    ports:
      - "8545:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('net').connect(8545,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\"",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
    networks: [app-net]

  # One-shot: deploys Marketplace.sol to hardhat-node and writes the address
  # to a shared volume. Re-runs (and re-deploys) on every `docker compose up`
  # since hardhat-node's chain state doesn't persist across container restarts.
  contract-deploy:
    build: ./contracts
    image: simple-purchase-dapp-contracts:local
    profiles: ["local-chain"]
    command: ["npx", "hardhat", "ignition", "deploy", "--network", "docker", "ignition/modules/Marketplace.ts"]
    environment:
      HARDHAT_RPC_URL: http://hardhat-node:8545
    depends_on:
      hardhat-node:
        condition: service_healthy
    volumes:
      - contract-artifacts:/app/ignition/deployments
    networks: [app-net]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://dapp:${POSTGRES_PASSWORD:-dapp}@postgres:5432/dapp?schema=public
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      JWT_EXPIRES_IN: 1h
      # Local Hardhat-in-Docker default. For a Sepolia deployment, override
      # RPC_URL and set CONTRACT_ADDRESS (the one-time `deploy:sepolia`
      # output) instead -- CONTRACT_ADDRESS_FILE is only used as a fallback
      # when CONTRACT_ADDRESS is unset.
      RPC_URL: ${RPC_URL:-http://hardhat-node:8545}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-}
      CONTRACT_ADDRESS_FILE: /deployments/chain-31337/deployed_addresses.json
    depends_on:
      postgres:
        condition: service_healthy
      contract-deploy:
        condition: service_completed_successfully
        required: false
    volumes:
      - contract-artifacts:/deployments:ro
    ports:
      - "8090:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [app-net]

  frontend:
    build:
      context: ./frontend
      args:
        # Vite inlines env vars at build time. Defaults to a same-origin
        # relative path, which nginx (see frontend/nginx.conf) reverse-proxies
        # to the backend container -- so this normally doesn't need to be
        # set. Only override it if the frontend and backend are served from
        # different origins.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks: [app-net]

volumes:
  pgdata:
  contract-artifacts:

networks:
  app-net:
    driver: bridge
